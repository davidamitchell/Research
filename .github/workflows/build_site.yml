name: Build and Deploy Research Site

# Builds the static GitHub Pages site from Research/completed/ and commits
# the generated docs/ output back to main.  GitHub Pages is configured to
# serve from docs/ on the main branch (Settings → Pages → Deploy from a
# branch → main / docs/).
#
# Triggers:
#   - Push to main that touches any file in Research/completed/ or scripts/
#   - Manual dispatch from the Actions tab

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Research/completed/**"
      - "scripts/*.py"

jobs:
  build:
    name: Build and Deploy Site
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pip install mistune PyYAML

      - name: Extract metadata
        run: python scripts/extract_metadata.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit metadata and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/content_metadata.json docs/
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit"
          else
            git commit -m "docs: rebuild site and update metadata [skip ci]"
            git push
          fi
