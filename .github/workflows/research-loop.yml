name: Research Loop

# Autonomous research backlog worker.
#
# Each run processes one or more backlog items by feeding research-prompt.md to
# the GitHub Copilot CLI. Each Copilot invocation is a fresh session (new context
# window), matching the Ralph Wiggum pattern.
#
# Commits go directly to main -- no pull requests.
#
# Required repository secrets:
#   COPILOT_GITHUB_TOKEN -- PAT with Copilot access; mapped to GITHUB_TOKEN so the
#     Copilot CLI can authenticate. Settings -> Secrets -> New repository secret.
#   TAVILY_API_KEY -- Tavily web search API key; used by the tavily-mcp MCP server
#     (see .github/mcp.json). Without this, all Tavily searches fail silently.
#   YOUTUBE_DATA_API -- YouTube Data API key; used by src/fetchers/youtube.py to
#     fetch transcripts and metadata. Without this, YouTube fetches fail silently.
#
# Safety controls (see ADR-0004):
#   - Job-level timeout: 90 minutes hard ceiling per run.
#   - Per-run cap: scheduled runs process at most 3 items; dispatch default is 1.
#   - Absolute iteration ceiling: HARD_MAX_ITERATIONS (10).
#   - Failure limit: 2 consecutive Copilot failures abort the run.
#     Rate limit hits are NOT counted as failures -- they break the loop cleanly.
#   - Inter-iteration sleep: 30 s between iterations.
#   - No cancel-in-progress: a running loop is never killed by a new trigger.
#
# Trigger options:
#   1. Manual: Actions tab -> "Research Loop" -> Run workflow -> set max_items
#   2. Scheduled: runs automatically on weekday mornings (processes 3 items)

on:
  workflow_dispatch:
    inputs:
      max_items:
        description: "Max items to process (1-5). Defaults to 1 for safety."
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"

  schedule:
    # Weekdays at 07:00 UTC -- runs after the skills sync (Monday 06:00 UTC)
    - cron: "0 7 * * 1-5"

# Only one research loop runs at a time. Don't cancel in-progress runs.
concurrency:
  group: research-loop
  cancel-in-progress: false

jobs:
  research:
    name: Work research backlog
    runs-on: ubuntu-latest

    # Hard ceiling: no single run may exceed 90 minutes regardless of backlog size.
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run research loop
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_DATA_API: ${{ secrets.YOUTUBE_DATA_API }}
        run: |
          set -euo pipefail

          # ------------------------------------------------------------------ #
          # Safety constants                                                     #
          # ------------------------------------------------------------------ #
          HARD_MAX_ITERATIONS=10
          FAILURE_THRESHOLD=2
          INTER_ITERATION_SLEEP=30

          # ------------------------------------------------------------------ #
          # Determine per-run item cap                                          #
          # ------------------------------------------------------------------ #
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MAX_ITEMS="${{ inputs.max_items }}"
          else
            MAX_ITEMS="3"
          fi

          echo "Configuration: MAX_ITEMS=$MAX_ITEMS, HARD_MAX_ITERATIONS=$HARD_MAX_ITERATIONS, FAILURE_THRESHOLD=$FAILURE_THRESHOLD"

          ITERATION=0
          CONSECUTIVE_FAILURES=0

          # Temp files cleaned up on exit.
          COPILOT_OUT=$(mktemp)
          INJECTED_PROMPT=$(mktemp)
          trap 'rm -f "$COPILOT_OUT" "$INJECTED_PROMPT"' EXIT

          while true; do
            # ---------------------------------------------------------------- #
            # Hard ceiling guard                                                #
            # ---------------------------------------------------------------- #
            if [ "$ITERATION" -ge "$HARD_MAX_ITERATIONS" ]; then
              echo "::warning::Hard iteration ceiling ($HARD_MAX_ITERATIONS) reached. Stopping as a safety measure."
              break
            fi

            # ---------------------------------------------------------------- #
            # Max-items guard                                                   #
            # ---------------------------------------------------------------- #
            if [ "$ITERATION" -ge "$MAX_ITEMS" ]; then
              echo "Reached max_items=$MAX_ITEMS. Stopping."
              break
            fi

            # ---------------------------------------------------------------- #
            # Debugging: git state before rebase                               #
            # ---------------------------------------------------------------- #
            echo "--- [DEBUG] git state before rebase (iteration $((ITERATION + 1))) ---"
            echo "core.autocrlf: $(git config core.autocrlf 2>/dev/null || echo 'not set')"
            echo "core.fileMode: $(git config core.fileMode 2>/dev/null || echo 'not set')"
            echo "--- git diff --stat (working tree vs index) ---"
            git diff --stat
            echo "--- git diff --cached --stat (index vs HEAD) ---"
            git diff --cached --stat
            echo "--- git diff ---"
            git diff
            echo "--- [DEBUG] end pre-rebase state ---"

            # ---------------------------------------------------------------- #
            # Sync with remote                                                  #
            # ---------------------------------------------------------------- #
            if ! git pull --rebase origin main; then
              echo "::error::git pull --rebase failed -- possible conflict or network issue. Stopping loop."
              exit 1
            fi

            # ---------------------------------------------------------------- #
            # Orphan cleanup: remove in-progress files that are already in     #
            # completed (stuck from prior runs where the deletion was not       #
            # staged -- see ADR-0011). This ensures the loop never re-runs a   #
            # Copilot session on an item that was already successfully          #
            # completed.                                                        #
            # ---------------------------------------------------------------- #
            ORPHAN_COUNT=0
            shopt -s nullglob
            for f in Research/in-progress/*.md; do
              fname=$(basename "$f")
              [ "$fname" = ".gitkeep" ] && continue
              [ "$fname" = "README.md" ] && continue
              if [ -f "Research/completed/$fname" ]; then
                echo "::warning::Orphan in-progress file (already in completed): $fname -- removing."
                git rm --force "Research/in-progress/$fname"
                ORPHAN_COUNT=$((ORPHAN_COUNT + 1))
              fi
            done
            shopt -u nullglob
            if [ "$ORPHAN_COUNT" -gt 0 ]; then
              git commit -m "fix: remove $ORPHAN_COUNT orphaned in-progress file(s) already present in completed"
              git push origin main || true
            fi

            # ---------------------------------------------------------------- #
            # Pick next item (pure code -- zero LLM calls)                     #
            # ---------------------------------------------------------------- #
            # Applies priority rules: in-progress first, then backlog by
            # priority/blocks/date. Returns JSON context or {} if nothing to do.
            PICK=$(python -m src.main research pick)
            PICK_FILENAME=$(python3 -c "import sys, json; print(json.loads(sys.argv[1]).get('filename', ''))" "$PICK")

            if [ -z "$PICK_FILENAME" ]; then
              echo "Backlog is empty. Nothing more to do."
              break
            fi

            PICK_STATUS=$(python3 -c "import sys, json; print(json.loads(sys.argv[1])['status'])" "$PICK")
            echo "Selected item: $PICK_FILENAME (status: $PICK_STATUS)"

            # ---------------------------------------------------------------- #
            # Start item if it is still in the backlog                         #
            # ---------------------------------------------------------------- #
            if [ "$PICK_STATUS" = "backlog" ]; then
              echo "Starting backlog item: $PICK_FILENAME"
              python -m src.main research start "$PICK_FILENAME"
            fi

            # ---------------------------------------------------------------- #
            # Inject pre-computed context into the prompt                      #
            # ---------------------------------------------------------------- #
            # Eliminates the agent's discovery phase (item selection, frontmatter
            # parsing, status/review_count checks) -- those were 8-15 LLM calls.
            # Python handles the substitution to avoid bash escaping issues with
            # backticks and special characters in the markdown context block.
            python3 -c "import sys, json; pick = json.loads(sys.argv[1]); prompt = open('research-prompt.md').read(); print(prompt.replace('{{ITEM_CONTEXT}}', pick['context_block']))" "$PICK" > "$INJECTED_PROMPT"

            echo ""
            echo "========================================"
            echo "  Research iteration $((ITERATION + 1)) of $MAX_ITEMS"
            echo "  Item: $PICK_FILENAME"
            echo "========================================"
            echo ""

            # ---------------------------------------------------------------- #
            # Run Copilot session                                               #
            # ---------------------------------------------------------------- #
            # Tee output to $COPILOT_OUT for rate-limit detection.
            # pipefail propagates a non-zero Copilot exit through the pipe.
            # shellcheck disable=SC2094
            if copilot -p "$(cat "$INJECTED_PROMPT")" \
                --autopilot \
                --allow-all 2>&1 | tee "$COPILOT_OUT"; then
              CONSECUTIVE_FAILURES=0
            else
              # ------------------------------------------------------------ #
              # Distinguish rate-limit errors from genuine failures.          #
              # Rate limits are a capacity constraint, not a code error.      #
              # Retrying immediately is useless (3-hour cooldown). Counting   #
              # them as consecutive failures wastes the failure budget and    #
              # causes the job to abort with exit 1 on the next attempt.     #
              # ------------------------------------------------------------ #
              if grep -qi "rate limit" "$COPILOT_OUT"; then
                WAIT_HOURS=$(grep -oi 'try again in [0-9]\+ hour' "$COPILOT_OUT" | grep -o '[0-9]\+' || true)
                WAIT_MINS=$(grep -oi 'try again in [0-9]\+ minute' "$COPILOT_OUT" | grep -o '[0-9]\+' || true)
                if [ -n "$WAIT_HOURS" ]; then
                  COOLDOWN_MSG="${WAIT_HOURS}h cooldown indicated"
                elif [ -n "$WAIT_MINS" ]; then
                  COOLDOWN_MSG="${WAIT_MINS}m cooldown indicated"
                else
                  COOLDOWN_MSG="cooldown duration not parsed from message"
                fi
                echo "::warning::Copilot rate limit hit ($COOLDOWN_MSG). Stopping loop -- re-trigger when quota resets."
                if ! git diff --quiet || ! git diff --cached --quiet; then
                  echo "::warning::Dirty working tree/index after rate-limited session. Discarding uncommitted changes."
                  git reset --hard HEAD
                  git clean -fd
                fi
                git push origin main || true
                break
              fi

              # Not a rate limit -- treat as a genuine session failure.
              CONSECUTIVE_FAILURES=$((CONSECUTIVE_FAILURES + 1))
              echo "::warning::Copilot session failed (consecutive failures: $CONSECUTIVE_FAILURES/$FAILURE_THRESHOLD)"
              # Use reset --hard (not checkout -- .) so staged index changes
              # are also cleared; otherwise the next git pull --rebase fails
              # with "index contains uncommitted changes".
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "::warning::Dirty working tree/index after failed session. Discarding uncommitted changes."
                git reset --hard HEAD
                git clean -fd
              fi
              if [ "$CONSECUTIVE_FAILURES" -ge "$FAILURE_THRESHOLD" ]; then
                echo "::error::Consecutive failure threshold reached. Aborting to prevent runaway behaviour."
                exit 1
              fi
            fi

            # Push any commits the agent made.
            git push origin main || true

            # ---------------------------------------------------------------- #
            # Debugging: git state at end of iteration                         #
            # ---------------------------------------------------------------- #
            echo "--- [DEBUG] git state at end of iteration $((ITERATION + 1)) ---"
            echo "core.autocrlf: $(git config core.autocrlf 2>/dev/null || echo 'not set')"
            echo "core.fileMode: $(git config core.fileMode 2>/dev/null || echo 'not set')"
            echo "--- git diff --stat (working tree vs index) ---"
            git diff --stat
            echo "--- git diff --cached --stat (index vs HEAD) ---"
            git diff --cached --stat
            echo "--- [DEBUG] end post-iteration state ---"

            ITERATION=$((ITERATION + 1))

            # ---------------------------------------------------------------- #
            # Inter-iteration sleep                                             #
            # ---------------------------------------------------------------- #
            # Sleep unconditionally between iterations; if the pick is empty
            # next time we will break before doing any real work.
            if [ "$ITERATION" -lt "$MAX_ITEMS" ]; then
              echo "Sleeping ${INTER_ITERATION_SLEEP}s before next iteration..."
              sleep "$INTER_ITERATION_SLEEP"
            fi
          done

          echo ""
          echo "Research loop finished. Processed $ITERATION item(s)."
