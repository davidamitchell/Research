name: Sync Skills from upstream

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  sync:
    name: Sync .github/skills from davidamitchell/Skills
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone upstream Skills repo
        run: git clone --depth 1 https://github.com/davidamitchell/Skills.git /tmp/upstream-skills

      - name: Sync skill directories (preserve locally-added skills)
        run: |
          set -euo pipefail
          # Copy each skill directory from upstream into .github/skills/
          # Existing local-only skills (e.g. bbc-author) are preserved because
          # we only overwrite files that exist in the upstream repo.
          for skill_dir in /tmp/upstream-skills/*/; do
            skill_name=$(basename "$skill_dir")
            # Skip non-skill directories (decisions, etc.)
            if [ -f "$skill_dir/SKILL.md" ]; then
              mkdir -p ".github/skills/$skill_name"
              cp "$skill_dir/SKILL.md" ".github/skills/$skill_name/SKILL.md"
              echo "Synced: $skill_name"
            fi
          done

      - name: Commit updated skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/skills
          if git diff --cached --quiet; then
            echo "Skills already up to date"
          else
            git commit -m "chore: sync skills from upstream davidamitchell/Skills [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
