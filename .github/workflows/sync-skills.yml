name: Update Skills Submodule

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    name: Update .github/skills submodule to latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Update submodule to latest upstream commit
        run: git submodule update --remote .github/skills

      - name: Commit updated submodule pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/skills
          if git diff --cached --quiet; then
            echo "Skills submodule already up to date"
          else
            git commit -m "chore: update skills submodule to latest [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
