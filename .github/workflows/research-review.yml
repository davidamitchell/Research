name: Research Review

# Quality gate for research items under review.
#
# Applies four agent skills in sequence via research-reviewer orchestration:
#   1. citation-discipline  — all factual claims are sourced
#   2. speculation-control  — uncertain claims are explicitly labeled
#   3. remove-ai-slop       — prose is direct and free of formulaic AI patterns
#   4. peer-reviewer        — logical coherence, alternative explanations, cross-item integration
#
# The review is performed by the GitHub Copilot CLI reading
# research-review-prompt.md.  The agent writes a structured report to
# /tmp/research-review-report.txt; the workflow fails if it contains
# "OVERALL: FAIL".
#
# Required repository secret: COPILOT_GITHUB_TOKEN
#   A GitHub Personal Access Token (classic or fine-grained) with Copilot access.
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: COPILOT_GITHUB_TOKEN  Value: your PAT
#
# Trigger: Manual workflow_dispatch only.
#   The research loop calls `gh workflow run` after drafting (marking status: reviewing).
#   Actions tab → "Research Review" → Run workflow → supply item path

on:
  workflow_dispatch:
    inputs:
      item_path:
        description: >
          Path to the research item to review,
          e.g. Research/in-progress/2026-03-01-topic.md
        required: true
        type: string

# Reviews are independent; allow concurrent runs for different items.
concurrency:
  group: research-review-${{ github.sha }}
  cancel-in-progress: false

jobs:
  review:
    name: Research quality review
    runs-on: ubuntu-latest

    # A single item review should complete well within 30 minutes.
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Initialize skills submodule
        run: git submodule update --init .github/skills

      - name: Determine items to review
        id: items
        run: |
          echo "${{ inputs.item_path }}" > /tmp/items-to-review.txt

          if [ ! -s /tmp/items-to-review.txt ]; then
            echo "No research items to review."
            echo "has_items=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Items to review:"
          cat /tmp/items-to-review.txt
          echo "has_items=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.items.outputs.has_items == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        if: steps.items.outputs.has_items == 'true'
        run: npm install -g @github/copilot

      - name: Configure git identity
        if: steps.items.outputs.has_items == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run quality review
        if: steps.items.outputs.has_items == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Maximum number of review passes per item. After this, the item
          # is considered good enough and the review auto-passes.
          MAX_REVIEWS=2

          while IFS= read -r ITEM; do
            [ -z "$ITEM" ] && continue

            if [ ! -f "$ITEM" ]; then
              echo "::error::Item not found: $ITEM"
              continue
            fi

            echo ""
            echo "========================================"
            echo "  Reviewing: $ITEM"
            echo "========================================"
            echo ""

            # ---------------------------------------------------------------- #
            # Review cap check                                                  #
            # ---------------------------------------------------------------- #
            # Read review_count from YAML frontmatter (default 0 if absent).
            REVIEW_COUNT=$(grep -m1 '^review_count:' "$ITEM" | awk '{print $2}' || true)
            REVIEW_COUNT="${REVIEW_COUNT:-0}"
            echo "Review pass: $((REVIEW_COUNT + 1)) of $MAX_REVIEWS"

            if [ "$REVIEW_COUNT" -ge "$MAX_REVIEWS" ]; then
              echo "Review cap ($MAX_REVIEWS) reached for: $ITEM — auto-passing."
              {
                printf 'REVIEW_TARGET: %s\n' "${ITEM}"
                printf 'citation-discipline: PASS\n'
                printf 'speculation-control: PASS\n'
                printf 'remove-ai-slop: PASS\n'
                printf 'peer-reviewer: PASS\n'
                printf 'logical-coherence-and-evidence-sufficiency: PASS\n'
                printf 'alternative-explanations: PASS\n'
                printf 'cross-item-integration: PASS\n'
                printf 'OVERALL: PASS\n'
                printf 'NOTE: review cap reached (%s/%s)\n' "${REVIEW_COUNT}" "${MAX_REVIEWS}"
              } > /tmp/research-review-report.txt
              cat /tmp/research-review-report.txt
              continue
            fi

            # ---------------------------------------------------------------- #
            # Run the copilot review                                            #
            # ---------------------------------------------------------------- #
            sed "s|{{ITEM_PATH}}|${ITEM}|g" research-review-prompt.md \
              > /tmp/review-prompt.md

            rm -f /tmp/research-review-report.txt

            REVIEW_STATUS="PASS"
            if copilot -p "$(cat /tmp/review-prompt.md)" \
                --autopilot \
                --allow-all; then
              if [ -f /tmp/research-review-report.txt ]; then
                echo ""
                echo "=== Review Report ==="
                cat /tmp/research-review-report.txt
                echo "====================="
                echo ""
                if grep -q "^OVERALL: FAIL" /tmp/research-review-report.txt; then
                  REVIEW_STATUS="FAIL"
                  echo "::warning::Research quality review FAILED for: $ITEM (pass $((REVIEW_COUNT + 1)) of $MAX_REVIEWS — no issue raised)"
                else
                  echo "Research quality review PASSED for: $ITEM"
                fi
              else
                echo "::warning::Review report was not generated for: $ITEM"
                REVIEW_STATUS="FAIL"
              fi
            else
              echo "::warning::Copilot review agent failed for: $ITEM"
              REVIEW_STATUS="FAIL"
            fi

            # ---------------------------------------------------------------- #
            # Increment review_count in item frontmatter                       #
            # ---------------------------------------------------------------- #
            NEW_COUNT=$((REVIEW_COUNT + 1))
            if grep -q '^review_count:' "$ITEM"; then
              sed -i "s/^review_count:.*/review_count: ${NEW_COUNT}/" "$ITEM"
            else
              # Insert review_count after the opening --- line using awk
              awk -v n="$NEW_COUNT" 'NR==1 && /^---$/{print; print "review_count: "n; next}1' "$ITEM" > /tmp/item-patched.md
              mv /tmp/item-patched.md "$ITEM"
            fi

            git add "$ITEM"
            git commit -m "review: pass ${NEW_COUNT}/${MAX_REVIEWS} for $(basename "$ITEM" .md) — ${REVIEW_STATUS}"
            git push origin HEAD

          done < /tmp/items-to-review.txt

          echo ""
          echo "All research quality reviews complete."
