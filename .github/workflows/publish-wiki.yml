name: Publish Wiki

# Publishes completed research items to the GitHub wiki.
#
# Triggers:
#   - Any push to main that touches Research/completed/
#   - Manual dispatch from the Actions tab (GitHub website or iOS app)
#
# The wiki must be enabled once in repository Settings → Features → Wikis
# before this workflow can push to it.

on:
  push:
    branches: [main]
    paths:
      - "Research/completed/**"
  workflow_dispatch:

jobs:
  publish:
    name: Publish to GitHub Wiki
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=${GH_TOKEN}"; }; f'
          WIKI_URL="https://github.com/${{ github.repository }}.wiki.git"
          if git clone "$WIKI_URL" wiki; then
            echo "Wiki cloned successfully"
          else
            echo "Wiki repository not found — initializing empty local repo"
            mkdir wiki
            cd wiki
            git init
            git checkout -b master
            git remote add origin "$WIKI_URL"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Publish research items to wiki
        run: python -m src.wiki.publish Research/completed wiki

      - name: Commit and push wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "wiki: update from Research/completed"
            git push origin HEAD:master
          fi
