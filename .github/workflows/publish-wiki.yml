name: Publish Wiki

# Publishes completed research items to the GitHub wiki.
#
# Triggers:
#   - Any push to main that touches Research/completed/
#   - Manual dispatch from the Actions tab (GitHub website or iOS app)
#
# The wiki must be enabled once in repository Settings → Features → Wikis
# before this workflow can push to it.

on:
  push:
    branches: [main]
    paths:
      - "Research/completed/**"
  workflow_dispatch:

jobs:
  publish:
    name: Publish to GitHub Wiki
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Publish research items to wiki
        run: python -m src.wiki.publish Research/completed wiki

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "wiki: update from Research/completed"
            git push
          fi
