name: Process Evaluation Harness

# Manually triggered — lets you sample past research questions and run them
# through a specified process step to produce a reusable prompt bundle or
# scored comparison report.
#
# Usage:
#   Actions → Process Evaluation Harness → Run workflow
#
# Outputs are committed to state/eval_reports/ as JSON + Markdown.

on:
  workflow_dispatch:
    inputs:
      process:
        description: "Process step to evaluate"
        required: true
        type: choice
        options:
          - perspective-discovery
          - question-decomposition
          - adversarial-challenge
        default: perspective-discovery
      n:
        description: "Number of items to sample (1–20)"
        required: true
        type: choice
        options:
          - "3"
          - "5"
          - "10"
          - "20"
        default: "5"
      seed:
        description: "Random seed for reproducibility (leave blank for random)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  eval:
    name: Run evaluation harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out the branch the workflow_dispatch was triggered from, so
          # the workflow can be run directly from a PR branch before merging to main.
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run evaluation harness
        run: |
          SEED_ARG=""
          if [ -n "${{ inputs.seed }}" ]; then
            SEED_ARG="--seed ${{ inputs.seed }}"
          fi
          python scripts/eval_harness.py \
            --process "${{ inputs.process }}" \
            --n "${{ inputs.n }}" \
            $SEED_ARG

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/eval_reports/
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            git commit -m "eval: ${{ inputs.process }} n=${{ inputs.n }} seed=${{ inputs.seed || 'rnd' }}"
            git push
          fi
