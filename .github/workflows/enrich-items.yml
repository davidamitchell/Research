name: Enrich Items with AI Themes

# Calls Gemini (flash cascade) to add ai_themes frontmatter to completed
# research items that lack it.
#
# Two modes:
#   backfill  — iterates the completed corpus newest-first, skipping items
#               that already have ai_themes.  Commits every 20 items so a
#               crash or cancellation preserves progress.
#   single    — enriches exactly one item (useful after a new item lands on main).
#
# The push trigger runs automatically after the research-loop workflow commits
# new items to Research/completed/.  It processes up to 5 new items per push.
#
# Required secret:
#   GEMINI_API_KEY — Google Generative AI API key.
#
# The script calls the ListModels API on startup to build a live flash-model
# cascade (newest → oldest).  If the API call fails or returns no flash models,
# it falls back to the static cascade in src/pipeline/_gemini.py.
# Current confirmed-working model: gemini-2.5-flash (2026-05-11).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "backfill (all missing ai_themes) or single (one item)"
        required: true
        type: choice
        options:
          - backfill
          - single
        default: backfill
      item_path:
        description: >
          Item path for single mode, e.g.
          Research/completed/2026-05-09-foo.md
        required: false
        default: ""
      max_items:
        description: "Max items to process per run (backfill only, default 50)"
        required: false
        default: "50"
        type: choice
        options:
          - "10"
          - "20"
          - "50"
          - "100"
          - "297"

  push:
    branches: [main]
    paths:
      - "Research/completed/**"

concurrency:
  group: enrich-items
  cancel-in-progress: false

jobs:
  enrich:
    name: Enrich items with AI themes
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enrich items (backfill / dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          if [ "${{ inputs.mode }}" = "single" ]; then
            if [ -z "${{ inputs.item_path }}" ]; then
              echo "::error::item_path is required for single mode."
              exit 1
            fi
            python scripts/enrich_items.py \
              --item "${{ inputs.item_path }}" \
              --commit
          else
            python scripts/enrich_items.py \
              --backfill \
              --max-items "${{ inputs.max_items }}" \
              --commit
          fi

      - name: Enrich new items (push trigger)
        if: github.event_name == 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          # On a push event, process up to 5 items to keep the run short.
          # Newly committed items will lack ai_themes and are picked up first
          # because the script iterates newest-first.
          python scripts/enrich_items.py \
            --backfill \
            --max-items 5 \
            --commit

      - name: Push enriched items
        run: |
          git push origin main || true
