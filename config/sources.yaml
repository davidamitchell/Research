# Sources configuration
# Add research sources here. Each source is fetched when running `python -m src.main fetch`.

youtube:
  # Individual videos — fetch transcript for a specific URL.
  # Required: url
  # Optional: title (human label; used in log output only)
  videos:
    - url: https://youtu.be/HYUoS0GkGCs
      title: "HYUoS0GkGCs"

  # Channel sources — fetch the latest N videos from a channel.
  # Required: id (YouTube channel ID)
  # Optional: name (human label), max_videos (default: 5)
  channels: []
  # Example:
  # channels:
  #   - id: UC0C-17n9iuUQPylguM1d-lQ
  #     name: Nate Jones
  #     max_videos: 3

rss:
  # RSS/Atom feed sources — all confirmed accessible from GitHub Actions runner IPs (2026-03-05)
  # Required: url
  # Optional: name (human label)
  sources:
    # Practitioner blogs and lab announcements — low-to-medium frequency, high signal
    - url: https://huggingface.co/blog/feed.xml
      name: "Hugging Face Blog"
    - url: https://lilianweng.github.io/index.xml
      name: "Lil'Log (Lilian Weng)"
    - url: https://deepmind.google/blog/rss.xml
      name: "Google DeepMind Blog"
    - url: https://thegradient.pub/rss/
      name: "The Gradient"
    - url: https://bair.berkeley.edu/blog/feed.xml
      name: "BAIR Blog"
    - url: https://magazine.sebastianraschka.com/feed
      name: "Ahead of AI (Sebastian Raschka)"
    - url: https://simonwillison.net/atom/everything/
      name: "Simon Willison"

arxiv:
  # arXiv search terms for agent-driven discovery (via arxiv-mcp-server, not bulk RSS)
  # Use narrow, topic-specific queries; broad category feeds (~300-400 papers/day) require
  # a keyword-filter step before automated ingestion is practical.
  queries:
    - "large language models agents"
    - "agentic AI systems"
    - "predictive processing active inference"

gemini:
  # Preferred model for AI enrichment (enrich_items.py / enrich-items workflow).
  # The pipeline cascades through flash-class models newest-first if this model
  # is unavailable or returns a 404.  The cascade is built at runtime via the
  # ListModels API so new models (e.g. gemini-3.x) are picked up automatically.
  # Confirmed working: gemini-2.5-flash (2026-05-11).
  gemini_model: gemini-2.5-flash
